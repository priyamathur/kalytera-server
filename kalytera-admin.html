<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalytera Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0d10;--white:#e8ecf0;--cyan:#00c8e8;--red:#e85555;--green:#a8e060;--muted:#4e5a68;--border:rgba(255,255,255,0.08);--card:rgba(255,255,255,0.03)}
body{background:var(--bg);color:var(--white);font-family:'DM Mono',monospace;font-weight:300;font-size:13px;min-height:100vh}
nav{border-bottom:1px solid var(--border);padding:16px 40px;display:flex;align-items:center;justify-content:space-between}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:16px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--red)}
.nav-tag{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--red);background:rgba(232,85,85,0.1);border:1px solid rgba(232,85,85,0.2);padding:3px 10px;border-radius:100px}
.wrap{max-width:1100px;margin:0 auto;padding:40px}
.login-box{max-width:380px;margin:80px auto;padding:40px;border:1px solid var(--border);border-radius:16px;background:var(--card)}
.login-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--muted);margin-bottom:28px}
.form-label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.form-input{width:100%;background:#161b22;border:1px solid var(--border);border-radius:7px;padding:11px 14px;font-family:'DM Mono',monospace;font-size:13px;color:var(--white);outline:none;margin-bottom:16px}
.form-input:focus{border-color:rgba(0,200,232,0.35)}
.btn{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:12px 24px;border-radius:7px;border:none;cursor:pointer}
.btn-p{background:var(--cyan);color:#0a0d10;width:100%}
.btn-s{background:transparent;border:1px solid var(--border);color:var(--white);padding:8px 16px;font-size:11px}
.err{color:var(--red);font-size:11px;margin-top:8px;display:none}

/* STATS ROW */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px}
.stat-card{padding:24px;border:1px solid var(--border);border-radius:12px;background:var(--card)}
.stat-n{font-family:'Syne',sans-serif;font-weight:800;font-size:28px;letter-spacing:-1px;margin-bottom:4px}
.stat-l{font-size:11px;color:var(--muted)}
.c{color:var(--cyan)}.g{color:var(--green)}.r{color:var(--red)}.w{color:var(--white)}

/* TABLE */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh h2{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.sh-sub{font-size:11px;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tbl th{padding:10px 16px;text-align:left;font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);font-weight:400}
.tbl td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:12px;color:rgba(232,236,240,0.7);vertical-align:top}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,0.02)}
.tier-badge{display:inline-block;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:100px}
.tier-free{background:rgba(78,90,104,0.3);color:var(--muted);border:1px solid rgba(78,90,104,0.3)}
.tier-starter{background:rgba(0,200,232,0.1);color:var(--cyan);border:1px solid rgba(0,200,232,0.2)}
.tier-growth{background:rgba(168,120,255,0.1);color:#a878ff;border:1px solid rgba(168,120,255,0.2)}
.tier-scale{background:rgba(168,224,96,0.1);color:var(--green);border:1px solid rgba(168,224,96,0.2)}
.usage-bar-wrap{width:100px;background:rgba(255,255,255,0.05);border-radius:4px;height:5px;margin-top:5px}
.usage-bar{height:5px;border-radius:4px;background:var(--cyan)}
.usage-bar.warn{background:var(--red)}
.org-name{font-family:'Syne',sans-serif;font-weight:700;color:var(--white);font-size:13px}
.org-id{font-size:10px;color:var(--muted);margin-top:2px}
.keys-list{display:flex;flex-direction:column;gap:3px}
.key-chip{font-size:10px;color:var(--muted);background:rgba(255,255,255,0.04);padding:2px 8px;border-radius:3px;display:inline-block}
.empty{text-align:center;padding:48px;color:var(--muted);font-size:12px}
.refresh-btn{font-size:10px;color:var(--cyan);cursor:pointer;background:none;border:1px solid rgba(0,200,232,0.2);border-radius:5px;padding:5px 12px;font-family:'DM Mono',monospace}
.loading{text-align:center;padding:48px;color:var(--muted)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:-3px}
@keyframes spin{to{transform:rotate(360deg)}}
.section{margin-bottom:40px}
</style>
</head>
<body>

<nav>
  <div class="logo"><div class="dot"></div>Kalytera <span style="color:var(--muted);font-weight:300;margin-left:4px">/ Admin</span></div>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="nav-tag">Owner only</span>
    <button class="btn btn-s" onclick="logout()">Sign out</button>
  </div>
</nav>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-box">
    <div class="login-title">Admin login</div>
    <div class="login-sub">Enter your Kalytera master API key.</div>
    <label class="form-label">Master API key</label>
    <input class="form-input" id="key-input" type="password" placeholder="Enter KALYTERA_API_KEY" />
    <button class="btn btn-p" onclick="login()">Sign in →</button>
    <div class="err" id="login-err">Invalid key — check KALYTERA_API_KEY in your .env</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dash-view" style="display:none">
  <div class="wrap">

    <div class="stats" id="stats-row">
      <div class="stat-card"><div class="stat-n c" id="s-total">—</div><div class="stat-l">Total orgs</div></div>
      <div class="stat-card"><div class="stat-n g" id="s-paid">—</div><div class="stat-l">Paid (starter+)</div></div>
      <div class="stat-card"><div class="stat-n w" id="s-sessions">—</div><div class="stat-l">Sessions this month</div></div>
      <div class="stat-card"><div class="stat-n r" id="s-near-limit">—</div><div class="stat-l">Near limit (>80%)</div></div>
    </div>

    <div class="section">
      <div class="sh">
        <div><h2>All organizations</h2><div class="sh-sub">Every signup, their tier, usage, and API keys</div></div>
        <button class="refresh-btn" onclick="loadOrgs()">↻ Refresh</button>
      </div>
      <div id="orgs-table"><div class="loading"><span class="spinner"></span>Loading…</div></div>
    </div>

  </div>
</div>

<script>
const API_BASE = 'https://agentiq-api-z9it.onrender.com';
const TIERS = { free: 10000, starter: 50000, growth: 200000, scale: null };
let _key = '';

function login() {
  const k = document.getElementById('key-input').value.trim();
  if (!k) return;
  _key = k;
  document.getElementById('login-err').style.display = 'none';
  loadOrgs();
}

function logout() {
  _key = '';
  document.getElementById('login-view').style.display = 'block';
  document.getElementById('dash-view').style.display = 'none';
  document.getElementById('key-input').value = '';
}

async function loadOrgs() {
  try {
    const res = await fetch(API_BASE + '/admin/orgs', {
      headers: { 'Authorization': 'Bearer ' + _key }
    });
    if (res.status === 401) {
      document.getElementById('login-err').style.display = 'block';
      return;
    }
    const orgs = await res.json();
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('dash-view').style.display = 'block';
    renderStats(orgs);
    renderTable(orgs);
  } catch(e) {
    document.getElementById('login-err').textContent = 'Could not reach server.';
    document.getElementById('login-err').style.display = 'block';
  }
}

function renderStats(orgs) {
  const paid = orgs.filter(o => o.tier !== 'free').length;
  const sessions = orgs.reduce((a, o) => a + (o.sessions_this_month || 0), 0);
  const nearLimit = orgs.filter(o => {
    const lim = TIERS[o.tier];
    return lim && (o.sessions_this_month / lim) >= 0.8;
  }).length;
  document.getElementById('s-total').textContent = orgs.length;
  document.getElementById('s-paid').textContent = paid;
  document.getElementById('s-sessions').textContent = sessions.toLocaleString();
  document.getElementById('s-near-limit').textContent = nearLimit;
}

function renderTable(orgs) {
  if (!orgs.length) {
    document.getElementById('orgs-table').innerHTML = '<div class="empty">No signups yet.</div>';
    return;
  }
  // Sort: paid first, then by signup date desc
  orgs.sort((a, b) => {
    if (a.tier !== 'free' && b.tier === 'free') return -1;
    if (a.tier === 'free' && b.tier !== 'free') return 1;
    return new Date(b.created_at) - new Date(a.created_at);
  });

  const rows = orgs.map(o => {
    const lim = TIERS[o.tier];
    const pct = lim ? Math.min(100, Math.round(o.sessions_this_month / lim * 100)) : 0;
    const warn = pct >= 80;
    const keys = (o.api_keys || []).map(k =>
      `<span class="key-chip">${k.name}: ${k.prefix}…</span>`
    ).join('');
    const users = (o.users || []).map(u =>
      `<span style="font-size:11px;color:rgba(232,236,240,0.5)">${u.email}</span>`
    ).join('<br>');
    const created = new Date(o.created_at).toLocaleDateString('en-US', {month:'short',day:'numeric',year:'numeric'});
    return `
      <tr>
        <td>
          <div class="org-name">${o.name}</div>
          <div class="org-id">${o.org_id.slice(0,8)}…</div>
        </td>
        <td>${users || '<span style="color:var(--muted)">—</span>'}</td>
        <td><span class="tier-badge tier-${o.tier}">${o.tier}</span></td>
        <td>
          <div>${o.sessions_this_month.toLocaleString()} / ${lim ? lim.toLocaleString() : '∞'}</div>
          ${lim ? `<div class="usage-bar-wrap"><div class="usage-bar ${warn?'warn':''}" style="width:${pct}%"></div></div>` : ''}
        </td>
        <td><div class="keys-list">${keys || '<span style="color:var(--muted)">—</span>'}</div></td>
        <td style="color:var(--muted);font-size:11px">${created}</td>
      </tr>`;
  }).join('');

  document.getElementById('orgs-table').innerHTML = `
    <table class="tbl">
      <thead><tr>
        <th>Organization</th>
        <th>Users</th>
        <th>Tier</th>
        <th>Sessions this month</th>
        <th>API keys</th>
        <th>Signed up</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

document.getElementById('key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>

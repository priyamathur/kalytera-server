services:
  - type: web
    name: kalytera-dashboard
    env: python
    plan: free
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: cd dashboard && pip install -r requirements.txt
    startCommand: cd dashboard && streamlit run main.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: API_BASE_URL
        value: https://kalytera-api-z9it.onrender.com
      - key: PYTHONPATH
        value: .
    autoDeploy: true
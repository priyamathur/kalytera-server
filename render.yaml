databases:
  - name: kalytera-postgres
    plan: free
    databaseName: kalytera
    user: kalytera

services:
  # Main FastAPI Application
  - type: web
    name: kalytera-api
    env: python
    plan: free
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: KALYTERA_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: kalytera-postgres
          property: connectionString
      - key: PYTHONPATH
        value: .
      - key: PYTHONUNBUFFERED
        value: "1"
    autoDeploy: true

  # Streamlit Dashboard
  - type: web
    name: kalytera-dashboard
    env: python
    plan: free
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run kalytera/dashboard.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kalytera-postgres
          property: internalConnectionString
      - key: KALYTERA_API_ENDPOINT
        value: https://kalytera-api.onrender.com
      - key: PYTHONPATH
        value: .
    autoDeploy: true

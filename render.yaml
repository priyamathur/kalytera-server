services:
  # PostgreSQL Database
  - type: pserv
    name: agentiq-db
    env: postgresql
    plan: free
    databaseName: agentiq
    databaseUser: agentiq
    
  # Main FastAPI Application
  - type: web
    name: agentiq-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.ingest_endpoints:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        value: your_anthropic_api_key_here
      - key: DATABASE_URL
        fromDatabase:
          name: agentiq-db
          property: connectionString
      - key: PYTHONPATH
        value: .
      - key: JUDGE_MODEL
        value: claude-3-haiku-20240307
      - key: JUDGE_PASS_THRESHOLD
        value: 0.7
      - key: EVALUATION_BATCH_SIZE
        value: 5
    autoDeploy: true
services:
  # PostgreSQL Database
  - type: pserv
    name: agentiq-db
    env: postgresql
    plan: free
    databaseName: agentiq
    databaseUser: agentiq

  # Main FastAPI Application
  - type: web
    name: agentiq-api
    env: python
    plan: free
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AGENTIQ_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: agentiq-db
          property: connectionString
      - key: PYTHONPATH
        value: .
    autoDeploy: true

  # Streamlit Dashboard
  - type: web
    name: agentiq-dashboard
    env: python
    plan: free
    runtime: python
    pythonVersion: 3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run agentiq/dashboard.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: AGENTIQ_API_ENDPOINT
        value: https://agentiq-api.onrender.com
      - key: PYTHONPATH
        value: .
    autoDeploy: true
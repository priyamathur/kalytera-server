services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kalytera
      POSTGRES_USER: kalytera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalytera"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kalytera:${POSTGRES_PASSWORD}@postgres:5432/kalytera
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build: .
    restart: unless-stopped
    command: >
      streamlit run kalytera/dashboard.py
      --server.port 8501
      --server.address 0.0.0.0
      --server.headless true
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://kalytera:${POSTGRES_PASSWORD}@postgres:5432/kalytera
      KALYTERA_API_ENDPOINT: http://api:8000
    depends_on:
      - api

volumes:
  pgdata:
